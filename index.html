<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars - Galaxia de Personajes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Vinculación de la fuente StarJedi local */
        @font-face {
            font-family: 'StarJedi';
            src: url('./starjedi/Starjedi.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        .font-starwars {
            font-family: 'StarJedi', sans-serif;
            letter-spacing: 2px;
        }

        body {
            background-image: url('./fondo.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-modal {
            animation: fadeInScale 0.25s ease-out forwards;
        }
    </style>
</head>
<body class="text-white min-h-screen font-sans bg-slate-950">

    <div class="container mx-auto px-4 py-8">
        
        <header class="text-center mb-10 max-w-4xl mx-auto bg-slate-950/80 backdrop-blur-md p-6 rounded-2xl border border-yellow-500 shadow-[0_0_20px_rgba(234,179,8,0.2)]">
            <h1 class="text-4xl md:text-5xl font-starwars text-yellow-400 mb-2 tracking-widest">
                STAR WARS
            </h1>
            <p class="text-xs md:text-sm text-slate-400 font-medium uppercase tracking-widest">
                Personajes de la Galaxia & Comparador Oficial
            </p>
        </header>

        <section id="comparison-section" class="hidden fixed inset-0 bg-slate-950/85 backdrop-blur-md z-50 overflow-y-auto p-4 md:p-6 items-center justify-center"></section>

        <main id="character-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 max-w-7xl mx-auto min-h-[600px]"></main>

        <div class="flex justify-center items-center gap-4 mt-12 mb-8">
            <button 
                id="prev-btn" 
                class="bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-bold uppercase tracking-wider px-6 py-2.5 rounded-xl text-sm transition duration-300 disabled:opacity-40 cursor-pointer shadow-md select-none"
            >
                Anterior
            </button>
            
            <span 
                id="page-indicator" 
                class="text-slate-400 font-medium text-sm tracking-wider bg-slate-900/90 px-5 py-2.5 rounded-xl border border-slate-800 min-w-[90px] text-center"
            >
                1 de 11
            </span>

            <button 
                id="next-btn" 
                class="bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-bold uppercase tracking-wider px-6 py-2.5 rounded-xl text-sm transition duration-300 disabled:opacity-40 cursor-pointer shadow-md select-none"
            >
                Siguiente
            </button>
        </div>

    </div>

    <script src="./index.js"></script>
</body>
</html>
