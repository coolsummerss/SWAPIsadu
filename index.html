<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarWars - Personajes</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        body {
            background-image: url('fondo.jpg');
            background-color: #020617;
        }
        img {
            transition: opacity 0.3s ease-in-out;
        }
        #character-list > div {
            backdrop-filter: blur(6px) !important;
            background-color: rgba(15, 23, 42, 0.85) !important;
        }
    </style>
</head>
<body class="text-white min-h-screen bg-cover bg-center bg-fixed bg-no-repeat">

    <div class="container mx-auto p-6">
        
        <div class="border-2 border-yellow-400 rounded-3xl p-6 shadow-2xl text-center mb-8 bg-slate-900/80 backdrop-blur-sm">
            <h1 class="text-4xl font-black text-yellow-400 tracking-wider">STAR WARS</h1>
            <p class="text-slate-400 text-sm mt-2">Personajes de la Galaxia</p>
        </div>

        <div id="character-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mb-8">
            </div> 

        <div class="flex justify-center gap-4 mt-8">
            <button id="prev-btn" class="bg-yellow-500 text-slate-950 px-6 py-2 rounded-xl shadow-lg font-bold cursor-pointer hover:bg-yellow-400 transition duration-300">
                Anterior
            </button>
            <button id="next-btn" class="bg-yellow-500 text-slate-950 px-6 py-2 rounded-xl shadow-lg font-bold cursor-pointer hover:bg-yellow-400 transition duration-300">
                Siguiente
            </button>
        </div>

    </div>

    <script src="index.js"></script>
</body>
</html>
